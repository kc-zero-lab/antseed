<section id="view-config" class="view" role="tabpanel">
  <div class="page-header">
    <h2>Settings</h2>
    <div class="page-header-right">
      <button id="configSaveBtn">Save</button>
      <div id="configMeta" class="connection-badge badge-idle">Redacted</div>
    </div>
  </div>
  <p id="configMessage" class="message">Loading config...</p>

  <div class="settings-sections">
    <article class="panel settings-panel">
      <div class="panel-head"><h3>Buyer Settings</h3></div>
      <div class="form-grid">
        <label class="form-label">Proxy Port
          <input id="cfgProxyPort" type="number" class="form-input" value="8080" />
        </label>
        <label class="form-label">Preferred Providers (comma-separated)
          <input id="cfgPreferredProviders" type="text" class="form-input" value="" />
        </label>
        <label class="form-label">Max Input Price (USD per 1M)
          <input id="cfgBuyerMaxInputUsdPerMillion" type="number" class="form-input" step="0.01" value="0" />
        </label>
        <label class="form-label">Max Output Price (USD per 1M)
          <input id="cfgBuyerMaxOutputUsdPerMillion" type="number" class="form-input" step="0.01" value="0" />
        </label>
        <label class="form-label">Min Peer Reputation (0-100)
          <input id="cfgMinRep" type="number" class="form-input" min="0" max="100" value="0" />
        </label>
      </div>
    </article>

    <article class="panel settings-panel">
      <div class="panel-head"><h3>Payment Settings</h3></div>
      <div class="form-grid">
        <label class="form-label">Preferred Payment Method
          <select id="cfgPaymentMethod" class="form-input">
            <option value="crypto">Crypto (USDC)</option>
          </select>
        </label>
      </div>
    </article>
  </div>
</section>
