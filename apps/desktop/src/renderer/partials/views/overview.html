<section id="view-overview" class="view" role="tabpanel">
  <div class="page-header">
    <h2>Overview</h2>
    <div id="overviewBadge" class="connection-badge badge-idle">Idle</div>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <p class="stat-label">Buyer Runtime</p>
      <p id="ovNodeState" class="stat-value">idle</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Active Peers</p>
      <p id="ovPeers" class="stat-value">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">DHT Health</p>
      <p id="ovDhtHealth" class="stat-value">Down</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Proxy Port</p>
      <p id="ovUptime" class="stat-value">-</p>
    </div>
  </div>

  <div class="panel-grid two-col">
    <article class="panel panel-span-full">
      <div class="panel-head">
        <h3>Top Peers</h3>
        <span id="ovPeersCount" class="panel-count">0</span>
      </div>
      <div class="table-wrap compact">
        <table class="table">
          <thead>
            <tr>
              <th>Peer</th>
              <th>Providers</th>
              <th>Rep</th>
            </tr>
          </thead>
          <tbody id="overviewPeersBody">
            <tr><td colspan="3" class="empty">No peers yet.</td></tr>
          </tbody>
        </table>
      </div>
    </article>
  </div>
</section>
