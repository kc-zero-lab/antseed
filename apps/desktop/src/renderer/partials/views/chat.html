<section id="view-chat" class="view active" role="tabpanel">
  <div class="page-header">
    <h2>AI Chat</h2>
    <div class="page-header-right">
      <select id="chatModelSelect" class="form-input chat-model-select">
        <option value="">Loading models...</option>
      </select>
      <div id="chatModelStatus" class="connection-badge badge-idle">Models idle</div>
      <div id="chatProxyStatus" class="connection-badge badge-idle">Proxy offline</div>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-main">
      <div id="chatHeader" class="chat-thread-header">
        <div class="chat-thread-title">
          <span class="chat-thread-peer">Conversation</span>
          <span id="chatThreadMeta" class="chat-thread-meta">No conversation selected</span>
        </div>
        <button id="chatDeleteBtn" class="btn-icon chat-delete-btn" title="Delete conversation" style="display:none">Delete</button>
      </div>
      <div id="chatMessages" class="chat-messages">
        <div class="chat-welcome">
          <div class="chat-welcome-title">AntSeed AI Chat</div>
          <div class="chat-welcome-subtitle">Send messages through the P2P marketplace to inference providers.</div>
          <div class="chat-welcome-subtitle">Buyer runtime auto-connects to the local proxy. Create a new conversation to begin.</div>
        </div>
      </div>
      <div class="chat-input-area">
        <textarea id="chatInput" class="chat-text-input" placeholder="Type a message... (Shift+Enter for newline)" rows="1" disabled></textarea>
        <button id="chatSendBtn" disabled>Send</button>
        <button id="chatAbortBtn" class="chat-abort-btn" style="display:none">Stop</button>
      </div>
      <div id="chatError" class="chat-error" style="display:none"></div>
    </div>
  </div>
</section>
